# 🚀 CI/CD Pipeline pour Medical Reminder App
# Ce workflow s'exécute automatiquement à chaque push ou pull request

name: CI/CD Pipeline

# 🎯 Déclencheurs : Quand ce workflow s'exécute
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# 📋 Variables d'environnement globales
env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

# 🔧 Jobs : Tâches à exécuter
jobs:
  # ===============================
  # 🧪 JOB 1: TESTS BACKEND
  # ===============================
  test-backend:
    name: 🐍 Tests Backend (Python/Flask)
    runs-on: ubuntu-latest
    
    services:
      # 🗄️ MongoDB pour les tests
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # 📥 Télécharger le code source
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 🐍 Installer Python
    - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # 📦 Cache des dépendances Python (pour aller plus vite)
    - name: 📦 Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 🔧 Installer les dépendances
    - name: 🔧 Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    # 🧪 Lancer les tests
    - name: 🧪 Run backend tests
      env:
        MONGO_URI: mongodb://localhost:27017/medical_reminder_test
        JWT_SECRET_KEY: test-secret-key
      run: |
        cd backend
        python -m pytest tests/ -v --cov=. --cov-report=xml

    # 📊 Upload coverage à Codecov (optionnel)
    - name: 📊 Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  # ===============================
  # 🧪 JOB 2: TESTS FRONTEND  
  # ===============================
  test-frontend:
    name: ⚛️ Tests Frontend (React)
    runs-on: ubuntu-latest

    steps:
    # 📥 Télécharger le code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 📦 Installer Node.js
    - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    # 🔧 Installer les dépendances
    - name: 🔧 Install frontend dependencies
      run: |
        cd frontend
        npm ci

    # 🧪 Lancer les tests
    - name: 🧪 Run frontend tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false

    # 🏗️ Build de production pour vérifier
    - name: 🏗️ Build frontend for production
      run: |
        cd frontend
        npm run build

  # ===============================
  # 🐳 JOB 3: TESTS DOCKER
  # ===============================
  test-docker:
    name: 🐳 Tests Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
    # 📥 Télécharger le code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 🐳 Setup Docker Buildx
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🧪 Test du build Docker
    - name: 🧪 Test Docker Compose build
      run: |
        docker-compose build --no-cache
        docker-compose config

  # ===============================
  # 🚀 JOB 4: DÉPLOIEMENT (seulement sur main)
  # ===============================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    # 📥 Télécharger le code
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 🚀 Déploiement (exemple avec Heroku/Railway/Vercel)
    - name: 🚀 Deploy to production
      run: |
        echo "🎉 Déploiement en production !"
        echo "🔗 URL: https://your-app.herokuapp.com"
        # Ici on ajouterait les commandes de déploiement réelles
        
    # 📧 Notification de succès
    - name: 📧 Notify deployment success
      run: |
        echo "✅ Déploiement réussi ! Application mise à jour."