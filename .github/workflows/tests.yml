# 🧪 Workflow Tests Rapides
# S'exécute sur chaque push pour des tests rapides

name: Quick Tests

# 🎯 Se déclenche sur tous les push et PR
on:
  push:
  pull_request:

# 🔧 Jobs de test rapides
jobs:
  # ===============================
  # 🚀 TESTS RAPIDES BACKEND
  # ===============================
  quick-backend-tests:
    name: 🐍 Quick Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 🔧 Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest

    - name: 🧪 Run quick tests
      run: |
        cd backend
        python -c "import app; print('✅ Backend imports OK')"
        python -m pytest --tb=short -q

  # ===============================
  # 🚀 TESTS RAPIDES FRONTEND
  # ===============================
  quick-frontend-tests:
    name: ⚛️ Quick Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 🔧 Install dependencies
      run: |
        cd frontend
        npm ci

    - name: 🧪 Run quick tests
      run: |
        cd frontend
        npm test -- --watchAll=false --passWithNoTests

    - name: 🔍 Lint check
      run: |
        cd frontend
        npm run build